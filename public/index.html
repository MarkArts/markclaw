// --- #16: Keyboard navigation ---
document.addEventListener('keydown', (e) => {
  // Don't capture when typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const key = e.key;

  if (key === '?') { document.getElementById('kbd-help').classList.toggle('open'); return; }
  if (key === 'Escape') { document.getElementById('kbd-help').classList.remove('open'); return; }
  if (key === '/') { e.preventDefault(); switchTab('search'); return; }
  if (key === 'r') { refresh(); return; }

  // Number keys for tabs
  if (key === 'w') { switchTab('work'); return; }
  const tabMap = {'1':'transcript','2':'messages','3':'logs','4':'agents','5':'schedules','6':'costs','7':'ratelimits'};
  if (tabMap[key]) { switchTab(tabMap[key]); return; }

  // j/k navigation in sidebar
  if (key === 'j' || key === 'k') {
    const folders = groupsCache.map(g => g.folder);
    if (folders.length === 0) return;
    const idx = folders.indexOf(currentGroup);
    let next;
    if (key === 'j') next = idx < folders.length - 1 ? idx + 1 : 0;
    else next = idx > 0 ? idx - 1 : folders.length - 1;
    selectGroup(folders[next]);
    return;
  }
});

// --- #19: Dynamic favicon ---
function updateFavicon() {
  const hasRunning = groupsCache.some(g => g.transcript_modified && (Date.now()/1000 - g.transcript_modified) < 120);
  const hasAwaiting = groupsCache.some(g => {
    const isRunning = g.transcript_modified && (Date.now()/1000 - g.transcript_modified) < 120;
    return isRunning && g.last_entry_type === 'assistant';
  });
  const c = document.createElement('canvas');
  c.width = 32; c.height = 32;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#e8a634';
  ctx.beginPath(); ctx.roundRect(0, 0, 32, 32, 6); ctx.fill();
  ctx.fillStyle = '#0a0e14';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('NC', 16, 17);
  if (hasAwaiting) {
    ctx.fillStyle = '#f87171';
    ctx.beginPath(); ctx.arc(26, 6, 6, 0, Math.PI*2); ctx.fill();
  } else if (hasRunning) {
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(26, 6, 5, 0, Math.PI*2); ctx.fill();
  }
  let link = document.querySelector('link[rel="icon"]');
  if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
  link.href = c.toDataURL();
}

// --- #20: Toast notifications ---
function showToast(msg, type) {
  type = type || 'info';
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
}

// --- #9: Simple markdown renderer ---
function renderMarkdown(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Bare URLs
  html = html.replace(/(^|[^"=])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  return html;
}

// --- #10: Search view ---
// --- Work tab: PRs + Jira (cached, grouped, with inline summaries) ---
let workData = { prs: [], tickets: [] };
let workBadgeCount = 0;
const summaryCache = {};

async function loadWork() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">loading work items...</div>';
  try {
    const res = await fetch('/api/work');
    const data = await res.json();
    workData = { prs: data.prs || [], tickets: data.tickets || [] };
    const prs = workData.prs;
    const tickets = workData.tickets;

    // Update work badge (failing CI count)
    workBadgeCount = prs.filter(p => p.ci === 'failure').length;
    updateWorkBadge();

    let html = '<div style="max-width:900px;margin:0 auto;width:100%;padding:16px">';
    if (data.cached) html += '<span class="work-updating" title="Data cached, refreshing in background">cached ' + Math.round((data.age || 0) / 1000) + 's ago</span>';

    // --- PRs section, grouped by repo ---
    html += '<div class="work-section">';
    html += '<div class="work-section-header" style="cursor:pointer;user-select:none" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\';this.querySelector(\'.arrow\').classList.toggle(\'collapsed\')">';
    html += '<span class="arrow" style="font-size:9px;transition:transform 0.2s;margin-right:4px">&#9660;</span>';
    html += 'Pull Requests <span style="color:var(--text-muted);text-transform:none;letter-spacing:0">(' + prs.length + ' open' + (workBadgeCount > 0 ? ', <span style="color:var(--red)">' + workBadgeCount + ' failing CI</span>' : '') + ')</span></div>';
    html += '<div class="work-section-body">';

    if (prs.length === 0) {
      html += '<div style="color:var(--text-dim);padding:12px;font-size:13px">No open PRs</div>';
    } else {
      // Group by repo
      const byRepo = {};
      for (const pr of prs) {
        const repo = (pr.repo || pr.repository?.nameWithOwner || '').split('/').pop() || 'other';
        if (!byRepo[repo]) byRepo[repo] = [];
        byRepo[repo].push(pr);
      }
      const repos = Object.keys(byRepo).sort();
      const multiRepo = repos.length > 1;

      for (const repo of repos) {
        const repoPrs = byRepo[repo];
        const repoId = 'repo-' + repo.replace(/[^a-zA-Z0-9]/g, '-');
        const failCount = repoPrs.filter(p => p.ci === 'failure').length;

        if (multiRepo) {
          html += '<div class="repo-group">';
          html += '<div class="repo-group-header" onclick="toggleRepoGroup(\'' + repoId + '\', this)">';
          html += '<span class="arrow">&#9660;</span> ' + escHtml(repo) + ' <span style="color:var(--text-dim)">(' + repoPrs.length + ')</span>';
          if (failCount > 0) html += ' <span style="color:var(--red);font-size:10px">' + failCount + ' failing</span>';
          html += '</div>';
          html += '<div class="repo-group-items" id="' + repoId + '">';
        }

        for (const pr of repoPrs) { html += renderPRItem(pr); }

        if (multiRepo) { html += '</div></div>'; }
      }
    }
    html += '</div></div>'; // close work-section-body and work-section

    // --- Jira section, split active vs stale ---
    const now = Date.now();
    const staleDays = 7;
    const active = tickets.filter(t => t.updated && (now - new Date(t.updated).getTime()) < staleDays * 86400000);
    const stale = tickets.filter(t => !t.updated || (now - new Date(t.updated).getTime()) >= staleDays * 86400000);

    html += '<div class="work-section">';
    html += '<div class="work-section-header" style="cursor:pointer;user-select:none" onclick="var b=this.nextElementSibling;b.style.display=b.style.display===\'none\'?\'block\':\'none\';this.querySelector(\'.arrow\').classList.toggle(\'collapsed\')">';
    html += '<span class="arrow" style="font-size:9px;transition:transform 0.2s;margin-right:4px">&#9660;</span>';
    html += 'Jira Tickets <span style="color:var(--text-muted);text-transform:none;letter-spacing:0">(' + tickets.length + ')</span></div>';
    html += '<div class="work-section-body">';

    if (tickets.length === 0) {
      html += '<div style="color:var(--text-dim);padding:12px;font-size:13px">No active tickets</div>';
    } else {
      for (const t of active) { html += renderJiraItem(t); }

      if (stale.length > 0) {
        html += '<div class="stale-section">';
        html += '<div class="stale-header" onclick="this.nextElementSibling.classList.toggle(\'collapsed\'); this.querySelector(\'.arrow\').classList.toggle(\'collapsed\')">';
        html += '<span class="arrow" style="font-size:9px;transition:transform 0.2s">&#9660;</span> Stale <span style="color:var(--text-dim)">(' + stale.length + ', no updates in ' + staleDays + 'd)</span></div>';
        html += '<div class="collapsed">';
        for (const t of stale) { html += renderJiraItem(t); }
        html += '</div></div>';
      }
    }
    html += '</div></div>'; // close work-section-body and work-section

    html += '</div>';
    content.innerHTML = html;

    // Restore any cached summaries
    for (const ref of Object.keys(summaryCache)) {
      const el = document.getElementById('summary-' + ref.replace(/[^a-zA-Z0-9]/g, '-'));
      if (el) {
        el.innerHTML = '<div class="summary-label">Summary</div>' + escHtml(summaryCache[ref]);
        el.style.display = 'block';
      }
    }
  } catch(e) {
    content.innerHTML = '<div class="empty-state">' + escHtml(e.message) + '</div>';
  }
}

function renderPRItem(pr) {
  const repo = pr.repo || pr.repository?.nameWithOwner || '';
  const shortRepo = repo.split('/').pop() || repo;
  const reviewCls = (pr.reviewDecision || '').toLowerCase().replace(/_/g, '-');
  const reviewLabel = { 'review-required': 'review needed', 'approved': 'approved', 'changes-requested': 'changes requested' }[reviewCls] || pr.reviewDecision || '';
  const ciCls = 'ci-' + (pr.ci || 'unknown');
  const ciLabel = { success: 'CI passing', failure: 'CI failing', pending: 'CI running', none: 'no CI', unknown: '' }[pr.ci || 'unknown'] || '';
  const prRef = shortRepo + '#' + pr.number;
  const prTitle = pr.title || '';
  const summaryId = 'summary-' + prRef.replace(/[^a-zA-Z0-9]/g, '-');
  const jiraRefs = pr.jiraRefs || [];

  let html = '<div class="work-item" style="flex-wrap:wrap">';
  html += '<div class="wi-main">';
  html += '<div class="wi-title"><a href="' + escHtml(pr.url) + '" target="_blank" rel="noopener">' + escHtml(prTitle) + '</a></div>';
  html += '<div class="wi-meta">';
  html += '<span>' + escHtml(prRef) + '</span>';
  for (const jRef of jiraRefs) {
    html += '<a class="jira-link" href="' + escHtml(window.__MC_CONFIG?.jiraSite || '') + '/browse/' + escHtml(jRef) + '" target="_blank" rel="noopener">' + escHtml(jRef) + '</a>';
  }
  if (reviewLabel) html += '<span class="wi-badge review-' + reviewCls + '">' + escHtml(reviewLabel) + '</span>';
  if (ciLabel) html += '<span class="wi-badge ' + ciCls + '">' + escHtml(ciLabel) + '</span>';
  if (pr.updatedAt) html += '<span>' + formatRelativeTime(pr.updatedAt) + '</span>';
  html += '</div>';
  // CI failed details — prefer job-level names (e.g. "test plan", "typecheck") over workflow names (e.g. "lint")
  if (pr.ci === 'failure') {
    const items = pr.ciFailedJobs || (pr.ciRuns || []).filter(r => r.conclusion === 'failure');
    if (items.length > 0) {
      const seen = new Set();
      html += '<div class="ci-details">';
      for (const item of items) {
        const name = item.name || 'check';
        if (seen.has(name)) continue;
        seen.add(name);
        html += '<span class="ci-run failure">&#10007; ' + escHtml(name) + '</span>';
        if (seen.size >= 5) break;
      }
      html += '</div>';
    }
  }
  html += '</div>';
  html += '<div class="wi-actions">';
  html += '<button class="wi-action" onclick="workAction(\'pickup\',\'pr\',\'' + escHtml(prRef) + '\',\'' + escAttr(prTitle) + '\',\'' + escAttr(pr.url) + '\')">Pick up</button>';
  html += '<button class="wi-action summarize" id="status-btn-' + escHtml(prRef.replace(/[^a-zA-Z0-9]/g, '-')) + '" onclick="event.stopPropagation(); workStatus(\'pr\',\'' + escHtml(prRef) + '\',\'' + escAttr(prTitle) + '\',\'' + escAttr(pr.url) + '\', this)">Status</button>';
  html += '<button class="wi-action" onclick="workAction(\'clean\',\'pr\',\'' + escHtml(prRef) + '\',\'' + escAttr(prTitle) + '\',\'' + escAttr(pr.url) + '\')">Clean</button>';
  html += '</div>';
  html += '<div class="wi-summary" id="' + summaryId + '" style="display:none;width:100%"></div>';
  html += '</div>';
  return html;
}

function renderJiraItem(t) {
  const statusKey = (t.status || '').toLowerCase().replace(/\s+/g, '-');
  const statusCls = statusKey.includes('review') ? 'status-in-review' : statusKey.includes('progress') ? 'status-in-progress' : 'status-todo';
  const summaryId = 'summary-' + t.key.replace(/[^a-zA-Z0-9]/g, '-');

  let html = '<div class="work-item" style="flex-wrap:wrap">';
  html += '<div class="wi-main">';
  html += '<div class="wi-title"><a href="' + escHtml(t.url) + '" target="_blank" rel="noopener">' + escHtml(t.key) + ': ' + escHtml(t.summary) + '</a></div>';
  html += '<div class="wi-meta">';
  html += '<span class="wi-badge ' + statusCls + '">' + escHtml(t.status) + '</span>';
  if (t.priority) html += '<span>' + escHtml(t.priority) + '</span>';
  if (t.type) html += '<span>' + escHtml(t.type) + '</span>';
  if (t.updated) html += '<span>' + formatRelativeTime(t.updated) + '</span>';
  html += '</div></div>';
  html += '<div class="wi-actions">';
  html += '<button class="wi-action" onclick="workAction(\'pickup\',\'jira\',\'' + escHtml(t.key) + '\',\'' + escAttr(t.summary) + '\',\'' + escAttr(t.url) + '\')">Pick up</button>';
  html += '<button class="wi-action summarize" id="status-btn-' + escHtml(t.key.replace(/[^a-zA-Z0-9]/g, '-')) + '" onclick="event.stopPropagation(); workStatus(\'jira\',\'' + escHtml(t.key) + '\',\'' + escAttr(t.summary) + '\',\'' + escAttr(t.url) + '\', this)">Status</button>';
  html += '<button class="wi-action" onclick="workAction(\'clean\',\'jira\',\'' + escHtml(t.key) + '\',\'' + escAttr(t.summary) + '\',\'' + escAttr(t.url) + '\')">Clean</button>';
  html += '</div>';
  html += '<div class="wi-summary" id="' + summaryId + '" style="display:none;width:100%"></div>';
  html += '</div>';
  return html;
}

function toggleRepoGroup(id, header) {
  const items = document.getElementById(id);
  items.classList.toggle('collapsed');
  header.classList.toggle('collapsed');
}

function updateWorkBadge() {
  const el = document.getElementById('work-count');
  el.className = 'work-count' + (workBadgeCount > 0 ? ' show' : '');
  el.textContent = workBadgeCount > 0 ? workBadgeCount : '';
}

function escAttr(s) {
  return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Status = inline LLM summary (cached, no session started)
async function workStatus(type, ref, title, url, btn) {
  const cacheKey = type + ':' + ref;
  const summaryId = 'summary-' + ref.replace(/[^a-zA-Z0-9]/g, '-');
  const summaryEl = document.getElementById(summaryId);
  if (!summaryEl) return;

  // Toggle if already shown
  if (summaryCache[cacheKey] && summaryEl.style.display !== 'none') {
    summaryEl.style.display = 'none';
    return;
  }

  // Show cached
  if (summaryCache[cacheKey]) {
    summaryEl.innerHTML = '<div class="summary-label">Summary</div>' + escHtml(summaryCache[cacheKey]);
    summaryEl.style.display = 'block';
    return;
  }

  // Fetch from API
  btn.classList.add('loading');
  btn.textContent = '...';
  summaryEl.innerHTML = '<div class="summary-label">Summarizing...</div>';
  summaryEl.style.display = 'block';

  try {
    const res = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, ref, url }),
    });
    const data = await res.json();
    if (data.error) {
      summaryEl.innerHTML = '<div class="summary-label">Error</div>' + escHtml(data.error);
    } else {
      summaryCache[cacheKey] = data.summary;
      summaryEl.innerHTML = '<div class="summary-label">Summary</div>' + escHtml(data.summary);
    }
  } catch(e) {
    summaryEl.innerHTML = '<div class="summary-label">Error</div>' + escHtml(e.message);
  } finally {
    btn.classList.remove('loading');
    btn.textContent = 'Status';
  }
}

// --- Housekeeping: rule-based session cleanup ---
async function runHousekeeping(btn) {
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  const resultsEl = document.getElementById('hk-results');

  try {
    const res = await fetch('/api/housekeeping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    const data = await res.json();
    if (data.error) {
      resultsEl.innerHTML = '<div class="hk-panel"><div style="color:var(--red)">' + escHtml(data.error) + '</div></div>';
      btn.disabled = false;
      btn.textContent = 'Retry Housekeeping';
      return;
    }

    const recs = data.recommendations || [];
    let html = '<div class="hk-panel">';
    html += '<h3>Cleanup Recommendations <span style="font-weight:400;color:var(--text-dim);font-size:11px">' + recs.length + ' stale of ' + data.total + ' total (' + data.running + ' running)</span></h3>';

    if (recs.length === 0) {
      html += '<div class="hk-empty">All sessions are active — nothing to clean up.</div>';
    } else {
      const categoryLabels = { empty: 'empty', stale_7d: '7d+', stale_24h: '24h+', stale_1h: '1h+' };
      const categoryColors = { empty: 'var(--text-dim)', stale_7d: 'var(--red)', stale_24h: 'var(--orange)', stale_1h: 'var(--text-muted)' };
      for (const r of recs) {
        const catLabel = categoryLabels[r.category] || r.category;
        const catColor = categoryColors[r.category] || 'var(--text-muted)';
        html += '<div class="hk-item">';
        html += '<input type="checkbox" checked data-folder="' + escHtml(r.folder) + '" onchange="updateHkCount()">';
        html += '<div class="hk-info">';
        html += '<div class="hk-name">' + escHtml(r.name) + ' <span style="font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(0,0,0,0.2);color:' + catColor + ';font-weight:400">' + catLabel + '</span></div>';
        html += '<div class="hk-reason">' + escHtml(r.reason) + '</div>';
        html += '<div class="hk-meta">';
        html += '<span>' + r.messageCount + ' msgs</span>';
        if (r.cost > 0.001) html += '<span style="color:var(--accent)">' + fmtCost(r.cost) + '</span>';
        html += '</div></div></div>';
      }
      html += '<div class="hk-actions">';
      html += '<button class="btn" id="hk-deactivate-btn" onclick="applyHousekeeping(\'deactivate\')" style="background:var(--accent-dim);border-color:var(--accent);color:var(--accent)">Deactivate Selected (' + recs.length + ')</button>';
      html += '<button class="btn" id="hk-delete-btn" onclick="applyHousekeeping(\'delete\')" style="border-color:rgba(248,113,113,0.3);color:var(--red)">Delete Selected (' + recs.length + ')</button>';
      html += '<button class="btn" onclick="document.getElementById(\'hk-results\').innerHTML=\'\'">Dismiss</button>';
      html += '<label style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;margin-left:auto;cursor:pointer"><input type="checkbox" id="hk-select-all" checked onchange="toggleHkAll(this.checked)"> Select all</label>';
      html += '</div>';
    }
    html += '</div>';
    resultsEl.innerHTML = html;
  } catch(e) {
    resultsEl.innerHTML = '<div class="hk-panel"><div style="color:var(--red)">' + escHtml(e.message) + '</div></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Housekeeping';
  }
}

function toggleHkAll(checked) {
  document.querySelectorAll('#hk-results input[data-folder]').forEach(cb => { cb.checked = checked; });
  updateHkCount();
}

function updateHkCount() {
  const checked = document.querySelectorAll('#hk-results input[data-folder]:checked').length;
  const deactBtn = document.getElementById('hk-deactivate-btn');
  const delBtn = document.getElementById('hk-delete-btn');
  if (deactBtn) deactBtn.textContent = 'Deactivate Selected (' + checked + ')';
  if (delBtn) delBtn.textContent = 'Delete Selected (' + checked + ')';
}

async function applyHousekeeping(mode) {
  const checkboxes = document.querySelectorAll('#hk-results input[data-folder]:checked');
  const folders = Array.from(checkboxes).map(cb => cb.dataset.folder);
  if (folders.length === 0) { showToast('Nothing selected', 'error'); return; }

  const action = mode === 'delete' ? 'Permanently delete' : 'Deactivate';
  const endpoint = mode === 'delete' ? '/api/delete-session' : '/api/deactivate';
  if (!confirm(action + ' ' + folders.length + ' session' + (folders.length > 1 ? 's' : '') + '?' + (mode === 'delete' ? ' This cannot be undone.' : ' Data is preserved.'))) return;

  let success = 0;
  let failed = 0;
  for (const folder of folders) {
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ folder }),
      });
      const data = await res.json();
      if (data.error) { failed++; } else { success++; }
    } catch { failed++; }
  }

  const verb = mode === 'delete' ? 'deleted' : 'deactivated';
  showToast(success + ' ' + verb + (failed > 0 ? ', ' + failed + ' failed' : ''), success > 0 ? 'success' : 'error');
  document.getElementById('hk-results').innerHTML = '';
  loadAgents();
  loadGroups();
}

async function doSearch() {
  const input = document.getElementById('search-input');
  const q = input.value.trim();
  if (!q) return;
  const results = document.getElementById('search-results');
  results.innerHTML = '<div class="loading">searching...</div>';
  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(q) + '&limit=50');
    const data = await res.json();
    if (data.error) { results.innerHTML = '<div class="empty-state">' + escHtml(data.error) + '</div>'; return; }
    let html = '';
    const msgs = data.messages || [];
    const trans = data.transcripts || [];
    if (msgs.length === 0 && trans.length === 0) {
      results.innerHTML = '<div class="empty-state">No results found</div>';
      return;
    }
    if (trans.length > 0) {
      html += '<div class="section-label">Transcripts (' + trans.length + ')</div>';
      for (const t of trans) {
        const snippet = t.snippet || '(no text content)';
        const highlighted = escHtml(snippet).replace(new RegExp(escHtml(q), 'gi'), '<mark>$&</mark>');
        const name = t.display_name || t.folder;
        html += '<div class="search-result" onclick="switchTab(\'transcript\'); selectGroup(\'' + escHtml(t.folder) + '\')">';
        html += '<div class="sr-source">' + escHtml(name) + ' · ' + escHtml(t.type) + (t.timestamp ? ' · ' + fmtDateTime(t.timestamp) : '') + '</div>';
        html += '<div class="sr-text">' + highlighted + '</div></div>';
      }
    }
    if (msgs.length > 0) {
      html += '<div class="section-label">Messages (' + msgs.length + ')</div>';
      for (const m of msgs) {
        const highlighted = escHtml(m.content).replace(new RegExp(escHtml(q), 'gi'), '<mark>$&</mark>');
        const grp = groupsCache.find(g => g.jid === m.chat_jid) || groupsCache.find(g => m.chat_jid && m.chat_jid.startsWith(g.jid));
        const grpName = grp ? (grp.display_name || grp.name) : '';
        html += '<div class="search-result"' + (grp ? ' onclick="switchTab(\'messages\'); selectGroup(\'' + escHtml(grp.folder) + '\')"' : '') + '>';
        html += '<div class="sr-source">' + (grpName ? escHtml(grpName) + ' · ' : '') + escHtml(m.sender_name || 'Unknown') + ' · ' + fmtDateTime(m.timestamp) + '</div>';
        html += '<div class="sr-text">' + highlighted + '</div></div>';
      }
    }
    results.innerHTML = html;
  } catch(e) {
    results.innerHTML = '<div class="empty-state">' + escHtml(e.message) + '</div>';
  }
}

  if (!confirm('Stop the running container for "' + name + '"?')) return;
  try {

      body: JSON.stringify({ folder: currentGroup }),

async function loadRateLimits() {

  }

    content.innerHTML = renderRateLimits(data);
  } catch(e) { content.innerHTML = '<div class="empty-state">' + escHtml(e.message) + '</div>'; }
}

function renderRateLimits(data) {
  const events = data.events || [];
  const summary = data.summary || {};
  const byGroup = data.byGroup || [];

  let html = '<div class="rl-dashboard">';

  // Summary stats
  html += '<div class="rl-stats">';
  const exhaustedCls = summary.totalExhausted > 0 ? 'red' : 'green';
  const retryCls = summary.totalRetries > 0 ? 'orange' : 'green';
  html += '<div class="rl-stat"><div class="label">Dropped (max retries)</div><div class="value ' + exhaustedCls + '">' + (summary.totalExhausted || 0) + '</div></div>';
  html += '<div class="rl-stat"><div class="label">Retries (last 7d)</div><div class="value ' + retryCls + '">' + (summary.totalRetries || 0) + '</div></div>';
  html += '<div class="rl-stat"><div class="label">Affected Sessions</div><div class="value">' + byGroup.length + '</div></div>';

  // Time since last event
  if (events.length > 0) {
    const lastTs = new Date(events[0].timestamp);
    const agoSecs = (Date.now() - lastTs.getTime()) / 1000;
    html += '<div class="rl-stat"><div class="label">Last Event</div><div class="value">' + formatDuration(agoSecs) + ' ago</div></div>';
  } else {
    html += '<div class="rl-stat"><div class="label">Last Event</div><div class="value green">none</div></div>';
  }
  html += '</div>';

  // Sessions affected
  if (byGroup.length > 0) {
    html += '<div class="rl-section"><h3>Affected Sessions</h3>';
    html += '<table class="cost-table"><thead><tr>';
    html += '<th>Session</th><th>Retries</th><th>Dropped</th><th>Last Event</th>';
    html += '</tr></thead><tbody>';
    for (const g of byGroup) {
      const ts = new Date(g.lastEvent);
      const ago = formatDuration((Date.now() - ts.getTime()) / 1000) + ' ago';
      html += '<tr' + (g.folder ? ' style="cursor:pointer" onclick="switchTab(\'transcript\'); selectGroup(\'' + escHtml(g.folder) + '\')"' : '') + '>';
      html += '<td>' + escHtml(g.name) + '</td>';
      html += '<td>' + g.retries + '</td>';
      html += '<td' + (g.exhausted > 0 ? ' style="color:var(--red);font-weight:600"' : '') + '>' + g.exhausted + '</td>';
      html += '<td>' + ago + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  // Event log
  html += '<div class="rl-section"><h3>Event Log <span style="font-weight:400;color:var(--text-dim);font-size:11px">last 7 days</span></h3>';
  if (events.length === 0) {
    html += '<div class="rl-empty">No retry events in the last 7 days. All clear.</div>';
  } else {
    // Show up to 100 events
    const shown = events.slice(0, 100);
    for (const e of shown) {
      const ts = new Date(e.timestamp);
      const timeStr = ts.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' + ts.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const isExhausted = e.type === 'max_retries_exceeded';
      const badge = isExhausted ? '<span class="rl-badge exhausted">DROPPED</span>' : '<span class="rl-badge retry">retry #' + e.retryCount + '</span>';
      let detail = isExhausted ? 'Messages dropped after ' + e.retryCount + ' retries' : 'Backoff ' + (e.delayMs / 1000).toFixed(0) + 's';
      if (e.error) detail += ' — ' + escHtml(e.error);
      html += '<div class="rl-event">';
      html += '<span class="rl-time">' + timeStr + '</span>';
      html += '<span class="rl-group">' + escHtml(e.groupName || e.groupJid) + '</span>';
      html += badge;
      html += '<span class="rl-detail">' + detail + '</span>';
      html += '</div>';
    }
    if (events.length > 100) {
      html += '<div style="text-align:center;color:var(--text-dim);font-size:11px;padding:8px">... ' + (events.length - 100) + ' more events</div>';
    }
  }
  html += '</div>';

  // How it works
  html += '<div class="rl-section"><h3>How Retries Work</h3>';
  html += '<p style="color:var(--text-dim);font-size:12px;line-height:1.6;font-family:var(--font-mono);margin:0">';
  html += 'When a container fails (rate limit, API error, crash), MarkClaw retries with exponential backoff: ';
  html += '5s, 10s, 20s, 40s, 80s (5 attempts total). ';
  html += 'If all retries fail, the messages are dropped. ';
  html += 'The next incoming message will trigger a fresh attempt.';
  html += '</p></div>';

  html += '</div>';
  return html;
}

function renderPlanDashboard(data) {
  const t = data.total;
  const plan = TEAM_PLAN;
  const subCost = plan.costPerSeat * plan.seats;
  const apiCost = t.cost;
  const mgmt = (data.management && data.management.total) ? data.management.total : { cost: 0, output_tokens: 0 };
  const totalCost = subCost + apiCost + mgmt.cost;
  const numDays = data.by_day.length || 1;

  // Weekly capacity: Team Premium = 6.25x Pro. Pro ≈ ~45M output tokens/week.
  // So Premium ≈ ~280M output tokens/week (rough estimate, Anthropic doesn't publish exact numbers)
  const WEEKLY_OUTPUT_CAP = 280000000;

  // Calculate this week's usage
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay()); // Sunday
  weekStart.setHours(0, 0, 0, 0);
  const weekStartStr = weekStart.toISOString().slice(0, 10);
  let weekOutputTokens = 0;
  let weekCost = 0;
  for (const d of data.by_day) {
    if (d.date >= weekStartStr) {
      weekOutputTokens += d.output_tokens;
      weekCost += d.cost;
    }
  }
  const weekPct = WEEKLY_OUTPUT_CAP > 0 ? (weekOutputTokens / WEEKLY_OUTPUT_CAP * 100) : 0;

  // Daily breakdown for the bar
  const avgDaily = apiCost / numDays;

  let html = '<div class="cost-dashboard">';

  // === TOP: Total cost ===
  html += '<div class="cost-summary">';
  html += '<div class="cost-card"><div class="label">Total Cost</div><div class="value accent">' + fmtCost(totalCost) + '</div><div class="sub">' + numDays + ' day' + (numDays > 1 ? 's' : '') + ' tracked</div></div>';
  html += '<div class="cost-card"><div class="label">Subscription</div><div class="value">' + fmtCost(subCost) + '/mo</div><div class="sub">' + escHtml(plan.name) + '</div></div>';
  html += '<div class="cost-card"><div class="label">API Overage</div><div class="value">' + fmtCost(apiCost + mgmt.cost) + '</div><div class="sub">billed per token on top</div></div>';
  html += '<div class="cost-card"><div class="label">Avg / Day</div><div class="value">' + fmtCost(avgDaily) + '</div><div class="sub">~' + fmtCost(avgDaily * 30) + '/mo projected</div></div>';
  html += '</div>';

  // === WEEKLY CAPACITY ===
  html += '<div class="cost-section"><h3>Weekly Capacity</h3>';
  html += '<p style="color:var(--text-dim);font-size:12px;margin:0 0 12px">Premium seat = 6.25x Pro usage per week. Estimate based on ~280M output tokens/week cap.</p>';

  // Progress bar
  const barPct = Math.min(weekPct, 100);
  const barColor = weekPct > 90 ? 'var(--red)' : weekPct > 60 ? 'var(--orange)' : 'var(--green)';
  html += '<div style="background:var(--bg-tertiary);border-radius:6px;height:28px;position:relative;overflow:hidden;margin-bottom:8px">';
  html += '<div style="width:' + barPct + '%;height:100%;background:' + barColor + ';border-radius:6px;transition:width 0.3s"></div>';
  html += '<div style="position:absolute;top:0;left:0;right:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--font-mono);font-weight:600;color:var(--text)">' + weekPct.toFixed(1) + '% used this week</div>';
  html += '</div>';

  html += '<div style="display:flex;justify-content:space-between;font-size:11px;font-family:var(--font-mono);color:var(--text-dim);margin-bottom:4px">';
  html += '<span>' + formatTokens(weekOutputTokens) + ' output used</span>';
  html += '<span>~' + formatTokens(WEEKLY_OUTPUT_CAP) + ' cap (est.)</span>';
  html += '</div>';
  html += '<div style="font-size:11px;font-family:var(--font-mono);color:var(--text-dim)">';
  html += 'Week API cost: ' + fmtCost(weekCost);
  html += '</div>';
  html += '</div>';

  // === DAILY USAGE CHART (reuse existing) ===
  if (data.by_day.length > 0) {
    html += '<div class="cost-section"><h3>Daily Usage</h3>';
    html += '<div class="cost-chart">' + renderDailyChart(data.by_day) + '</div>';
    html += '</div>';
  }

  // === BREAKDOWN: Crons vs Interactive ===
  if (data.by_type) {
    const s = data.by_type.scheduled;
    const i = data.by_type.interactive;
    const sCost = s.cost || 0;
    const iCost = i.cost || 0;
    const sOut = s.output_tokens || 0;
    const iOut = i.output_tokens || 0;
    if (sCost > 0 || iCost > 0) {
      html += '<div class="cost-section"><h3>Crons vs Conversations</h3>';
      html += '<table class="cost-table"><thead><tr>';
      html += '<th>Type</th><th>API Cost</th><th>Output Tokens</th><th>Input Tokens</th><th>Cache Read</th><th>% of Cost</th>';
      html += '</tr></thead><tbody>';
      if (iCost > 0 || iOut > 0) {
        html += '<tr><td>Conversations</td>';
        html += '<td class="cost-cell">' + fmtCost(iCost) + '</td>';
        html += '<td>' + formatTokens(iOut) + '</td>';
        html += '<td>' + formatTokens(i.input_tokens) + '</td>';
        html += '<td>' + formatTokens(i.cache_read_tokens) + '</td>';
        html += '<td>' + fmtPct(iCost, apiCost) + '</td></tr>';
      }
      if (sCost > 0 || sOut > 0) {
        html += '<tr><td>Scheduled (crons)</td>';
        html += '<td class="cost-cell">' + fmtCost(sCost) + '</td>';
        html += '<td>' + formatTokens(sOut) + '</td>';
        html += '<td>' + formatTokens(s.input_tokens) + '</td>';
        html += '<td>' + formatTokens(s.cache_read_tokens) + '</td>';
        html += '<td>' + fmtPct(sCost, apiCost) + '</td></tr>';
      }
      html += '</tbody></table></div>';
    }
  }

  // === PER-SESSION BREAKDOWN ===
  if (data.by_group && data.by_group.length > 0) {
    const sorted = [...data.by_group].sort((a, b) => b.cost - a.cost);
    html += '<div class="cost-section"><h3>By Session</h3>';
    html += '<table class="cost-table"><thead><tr>';
    html += '<th>Session</th><th>API Cost</th><th>Output</th><th>Cache Read</th><th>% of Total</th>';
    html += '</tr></thead><tbody>';
    for (const g of sorted) {
      if (g.cost < 0.001) continue;
      const pct = apiCost > 0 ? (g.cost / apiCost * 100).toFixed(1) : '0';
      html += '<tr style="cursor:pointer" onclick="switchTab(\'transcript\'); selectGroup(\'' + escHtml(g.folder) + '\')">';
      html += '<td>' + escHtml(g.display_name || g.name || g.folder) + '</td>';
      html += '<td class="cost-cell">' + fmtCost(g.cost) + '</td>';
      html += '<td>' + formatTokens(g.output_tokens) + '</td>';
      html += '<td>' + formatTokens(g.cache_read_tokens) + '</td>';
      html += '<td>' + pct + '%</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  // === MODEL MIX ===
  if (data.by_model && data.by_model.length > 0) {
    html += '<div class="cost-section"><h3>By Model</h3>';
    html += '<table class="cost-table"><thead><tr>';
    html += '<th>Model</th><th>API Cost</th><th>Output</th><th>Cache Read</th><th>% of Cost</th>';
    html += '</tr></thead><tbody>';
    for (const m of data.by_model) {
      if (m.cost < 0.001) continue;
      html += '<tr>';
      html += '<td>' + escHtml(m.model) + '</td>';
      html += '<td class="cost-cell">' + fmtCost(m.cost) + '</td>';
      html += '<td>' + formatTokens(m.output_tokens) + '</td>';
      html += '<td>' + formatTokens(m.cache_read_tokens) + '</td>';
      html += '<td>' + fmtPct(m.cost, apiCost) + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  // === MANAGEMENT (host Claude Code) ===
  if (mgmt.cost > 0) {
    html += '<div class="cost-section"><h3>Management (Host Claude Code)</h3>';
    html += '<p style="color:var(--text-dim);font-size:12px;margin:0 0 8px">Cost of developing MarkClaw via Claude Code on this machine.</p>';
    html += '<div class="cost-summary">';
    html += '<div class="cost-card"><div class="label">Mgmt Cost</div><div class="value">' + fmtCost(mgmt.cost) + '</div><div class="sub">' + fmtPct(mgmt.cost, apiCost + mgmt.cost) + ' of all API spend</div></div>';
    html += '<div class="cost-card"><div class="label">Mgmt Output</div><div class="value">' + formatTokens(mgmt.output_tokens) + '</div><div class="sub">output tokens</div></div>';
    html += '</div></div>';
  }

  html += '</div>';
  return html;
}

// --- #17: Export costs to CSV ---
function exportCostsCsv(data) {
  if (!data || !data.by_group) return;
  let csv = 'Session,Cost,Output Tokens,Input Tokens,Cache Read,Cache Write\\n';
  for (const g of data.by_group) {
    csv += '"' + (g.display_name || g.name || g.folder) + '",' + g.cost.toFixed(4) + ',' + g.output_tokens + ',' + g.input_tokens + ',' + g.cache_read_tokens + ',' + g.cache_create_tokens + '\\n';
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'markclaw-costs-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV exported', 'success');
}
