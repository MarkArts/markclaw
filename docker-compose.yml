services:
  markclaw:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - CONTAINER_IMAGE=markclaw-agent:latest
    # Podman-in-Docker requires privileged for cgroup access and keyring creation.
    # This is a single-user personal tool behind a VPN — not exposed to the internet.
    privileged: true
    volumes:
      # Persistent data
      - ./store:/app/store
      - ./data:/app/data
      - ./logs:/app/logs
      - ./groups:/app/groups
      # Podman container storage (persists pulled/loaded images)
      - markclaw-containers:/var/lib/containers/storage
      # Claude OAuth credentials (required — run `claude /login` on host first)
      - ~/.claude:/root/.claude:ro
      # Shared Nix store (optional — enables nix-shell in agent containers)
      - /nix:/nix:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  markclaw-containers:
