services:
  markclaw:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - CONTAINER_IMAGE=markclaw-agent:latest
    # Podman inside the container needs these for spawning agent containers
    devices:
      - /dev/fuse
    security_opt:
      - label=disable
    cap_add:
      - SYS_ADMIN
    volumes:
      # Persistent data
      - ./store:/app/store
      - ./data:/app/data
      - ./logs:/app/logs
      - ./groups:/app/groups
      # Podman container storage (persists pulled/loaded images)
      - markclaw-containers:/var/lib/containers/storage
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  markclaw-containers:
